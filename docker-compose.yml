services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-derlei_prod}
      POSTGRES_USER: ${POSTGRES_USER:-derlei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD é obrigatório}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-derlei}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-derlei}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-derlei_prod}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET é obrigatório}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OWNER_EMAIL: ${OWNER_EMAIL}
      NODE_ENV: production
      PORT: 3333
      CORS_ORIGIN: ${FRONTEND_URL:?FRONTEND_URL é obrigatório}
      APP_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3333:3333"
    restart: unless-stopped

  frontend:
    build:
      context: ./front
      args:
        VITE_API_URL: ${BACKEND_URL:?BACKEND_URL é obrigatório}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
